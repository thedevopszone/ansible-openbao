apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nginx-demo.fullname" . }}-init
  labels:
    {{- include "nginx-demo.labels" . | nindent 4 }}
data:
  fetch-secret.sh: |
    #!/bin/sh
    set -eu

    : "${VAULT_ADDR:?}"
    : "${VAULT_AUTH_PATH:?}"
    : "${VAULT_ROLE:?}"
    : "${VAULT_KV_PATH:?}"
    : "${VAULT_SECRET_KEY:?}"
    SHARED="${SHARED_DIR:-/shared}"

    echo "[init] login to OpenBao at $VAULT_ADDR via auth/$VAULT_AUTH_PATH (role=$VAULT_ROLE)"
    TOKEN=$(bao write -field=token "auth/${VAULT_AUTH_PATH}/login" \
        role="${VAULT_ROLE}" \
        jwt=@/var/run/secrets/kubernetes.io/serviceaccount/token)

    echo "[init] read $VAULT_KV_PATH (key=$VAULT_SECRET_KEY)"
    VALUE=$(VAULT_TOKEN="$TOKEN" bao kv get -field="${VAULT_SECRET_KEY}" "${VAULT_KV_PATH}")

    cat > "$SHARED/index.html" <<EOF
    <!doctype html>
    <html><head><meta charset="utf-8"><title>OpenBao demo</title></head>
    <body style="font-family:sans-serif;max-width:40em;margin:2em auto">
      <h1>OpenBao demo</h1>
      <p>Secret read from <code>${VAULT_KV_PATH}</code> via Kubernetes auth
         (role <code>${VAULT_ROLE}</code>).</p>
      <p><strong>${VAULT_SECRET_KEY}</strong> = <code>${VALUE}</code></p>
    </body></html>
    EOF

    echo "[init] wrote $SHARED/index.html"
