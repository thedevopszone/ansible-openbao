apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "nginx-demo.fullname" . }}
  labels:
    {{- include "nginx-demo.labels" . | nindent 4 }}
---
# Allow OpenBao to validate this SA's JWTs via the Kubernetes TokenReview API.
# OpenBao calls TokenReview using the requesting JWT itself, so the SA must be
# bound to system:auth-delegator.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "nginx-demo.fullname" . }}-tokenreview
  labels:
    {{- include "nginx-demo.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: {{ include "nginx-demo.fullname" . }}
    namespace: {{ .Release.Namespace }}
