apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "nginx-demo-eso.fullname" . }}
  labels:
    {{- include "nginx-demo-eso.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ include "nginx-demo-eso.fullname" . }}
    kind: SecretStore
  target:
    name: {{ .Values.externalSecret.targetSecretName }}
    creationPolicy: Owner
    template:
      data:
        index.html: |-
          <!doctype html>
          <html><head><meta charset="utf-8"><title>OpenBao demo (ESO)</title></head>
          <body style="font-family:sans-serif;max-width:40em;margin:2em auto">
            <h1>OpenBao demo (External Secrets Operator)</h1>
            <p>Secret reconciled from <code>{{ .Values.openbao.kvMount }}/{{ .Values.openbao.kvKey }}</code>
               via ESO + Kubernetes auth (role <code>{{ .Values.openbao.role }}</code>).</p>
            <p><strong>{{ .Values.openbao.secretKey }}</strong> = <code>{{ "{{" }} .{{ .Values.openbao.secretKey }} {{ "}}" }}</code></p>
          </body></html>
  data:
    - secretKey: {{ .Values.openbao.secretKey }}
      remoteRef:
        key: {{ .Values.openbao.kvKey }}
        property: {{ .Values.openbao.secretKey }}
