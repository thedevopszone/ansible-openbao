apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: {{ include "nginx-demo-eso.fullname" . }}
  labels:
    {{- include "nginx-demo-eso.labels" . | nindent 4 }}
spec:
  provider:
    vault:
      server: {{ .Values.openbao.addr | quote }}
      path: {{ .Values.openbao.kvMount | quote }}
      version: v2
      {{- with .Values.openbao.caBundle }}
      caBundle: {{ . | b64enc | quote }}
      {{- end }}
      auth:
        kubernetes:
          mountPath: {{ .Values.openbao.authPath | quote }}
          role: {{ .Values.openbao.role | quote }}
          serviceAccountRef:
            name: {{ include "nginx-demo-eso.fullname" . }}
